# project-git-mapping.yml
#
# Manually curated mapping of OpenGrants projectId → GitHub URLs.
# Used by sync_opengrants to enrich projects where org.stellar.communityfund.code is missing.
#
# Structure:
#   <projectId>:
#     git_owner_url: "https://github.com/<org>"
#     repo_name: "<repo>"  # optional
#
# Run the guess script to auto-populate candidates:
#   uv run python -m pg_atlas.procrastinate.guess_git_urls
#
