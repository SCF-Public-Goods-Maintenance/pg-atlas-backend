# SPDX-License-Identifier: MPL-2.0

# --- Projects with known GitHub URLs (manually verified) ---

daoip-5:scf:project:python_stellar_sdk:
  git_owner_url: "https://github.com/StellarCN"
  repo_name: "py-stellar-base"

