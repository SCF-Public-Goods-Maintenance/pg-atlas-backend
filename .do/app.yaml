name: pg-atlas-backend
region: ams

databases:
  - engine: PG
    name: pg-atlas-dev
    version: "18"

features:
  - buildpack-stack=ubuntu-22

domains:
  - domain: api.pgatlas.xyz
    type: PRIMARY

services:
  - name: api
    github:
      repo: SCF-Public-Goods-Maintenance/pg-atlas-backend
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile
    http_port: 8000
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: PG_ATLAS_API_URL
        scope: RUN_TIME
        value: "${APP_URL}"
      - key: PG_ATLAS_DATABASE_URL
        scope: RUN_TIME
        value: "${pg-atlas-dev.DATABASE_URL}"
      - key: PG_ATLAS_ARTIFACT_S3_ENDPOINT
        scope: RUN_TIME
        value: https://s3.filebase.com

ingress:
  rules:
  - component:
      name: api
    match:
      path:
        prefix: /
    cors:
      allow_origins:
        - regex: ".*"
      allow_methods:
        - GET

alerts:
- rule: DEPLOYMENT_FAILED
- rule: DOMAIN_FAILED
